apiVersion: v1
kind: ConfigMap
metadata:
  name: coturn-config
  namespace: youda-prod
data:
  turnserver.conf.template: |
    listening-port=3478
    tls-listening-port=5349
    min-port=49160
    max-port=49200
    fingerprint
    use-auth-secret
    static-auth-secret=$(TURN_SHARED_SECRET)
    realm=turn.youda.example.com
    stale-nonce=600
    no-multicast-peers
    no-cli
    simple-log
    log-file=stdout
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: youda-coturn
  namespace: youda-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: youda-coturn
  template:
    metadata:
      labels:
        app: youda-coturn
    spec:
      containers:
        - name: coturn
          image: coturn/coturn:4.6.2
          command: ["/bin/sh", "-c"]
          args:
            - |
              sed "s|\$(TURN_SHARED_SECRET)|${TURN_SHARED_SECRET}|g" /etc/coturn/turnserver.conf.template > /tmp/turnserver.conf
              turnserver -c /tmp/turnserver.conf
          env:
            - name: TURN_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: youda-web-secrets
                  key: turn-shared-secret
          ports:
            - containerPort: 3478
              name: turn-tcp
              protocol: TCP
            - containerPort: 3478
              name: turn-udp
              protocol: UDP
            - containerPort: 5349
              name: turns-tcp
              protocol: TCP
          volumeMounts:
            - name: coturn-config
              mountPath: /etc/coturn/turnserver.conf.template
              subPath: turnserver.conf.template
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: coturn-config
          configMap:
            name: coturn-config
---
apiVersion: v1
kind: Service
metadata:
  name: youda-coturn
  namespace: youda-prod
spec:
  selector:
    app: youda-coturn
  ports:
    - name: turn-tcp
      port: 3478
      targetPort: 3478
      protocol: TCP
    - name: turn-udp
      port: 3478
      targetPort: 3478
      protocol: UDP
    - name: turns-tcp
      port: 5349
      targetPort: 5349
      protocol: TCP
  type: LoadBalancer
