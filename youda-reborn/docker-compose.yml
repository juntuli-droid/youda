version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: youda_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: youda_db
      MYSQL_USER: youda_user
      MYSQL_PASSWORD: youdapassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql://youda_user:youdapassword@db:3306/youda_db

volumes:
  db_data:
