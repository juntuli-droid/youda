name: ZAP Baseline

on:
  workflow_dispatch:
  pull_request:

jobs:
  zap:
    runs-on: ubuntu-latest
    env:
      APP_ENV: production
      APP_BASE_URL: http://127.0.0.1:3000
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
      SENDGRID_PASSWORD_RESET_TEMPLATE_ID: ${{ secrets.SENDGRID_PASSWORD_RESET_TEMPLATE_ID }}
      SENDGRID_SUSPICIOUS_LOGIN_TEMPLATE_ID: ${{ secrets.SENDGRID_SUSPICIOUS_LOGIN_TEMPLATE_ID }}
      SENDGRID_LOGIN_CHALLENGE_TEMPLATE_ID: ${{ secrets.SENDGRID_LOGIN_CHALLENGE_TEMPLATE_ID }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @youda/database generate

      - name: Build web app
        run: pnpm --filter web build

      - name: Start web app
        run: |
          pnpm --filter web start &
          npx wait-on http://127.0.0.1:3000

      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://127.0.0.1:3000'
          fail_action: true
